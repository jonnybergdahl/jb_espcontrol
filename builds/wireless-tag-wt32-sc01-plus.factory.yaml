# =============================================================================
# FACTORY BUILD - Wireless-Tag WT32-SC01 Plus (3.5" landscape)
# =============================================================================
# Factory image variant: bundles www.js inline (js_include) instead of loading
# from GitHub CDN, so the web UI works on first boot before WiFi is configured.
# firmware_version is overridden by the release workflow at build time.
# dashboard_import enables one-click adoption in ESPHome Dashboard.
# =============================================================================

substitutions:
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include wireless-tag-wt32-sc01-plus.yaml

esphome:
  project:
    name: jonnybergdahl.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://jonnybergdahl/jb_espcontrol/devices/wireless-tag-wt32-sc01-plus/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/wireless-tag-wt32-sc01-plus/www.js"
