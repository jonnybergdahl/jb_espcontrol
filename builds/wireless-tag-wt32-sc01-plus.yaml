# =============================================================================
# BUILD PROFILE - Wireless-Tag WT32-SC01 Plus (3.5" landscape)
# =============================================================================
# CI/local build entry point. Includes the full device package and adds
# MAC suffix for unique naming. Used by the release workflow; the .factory
# variant bundles the web UI JS inline for initial flash images.
# =============================================================================

substitutions:
  name: "espcontrol-wt32-sc01p"
  friendly_name: "EspControl SC01 Plus"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"
  espcontrol_component_path: "../components"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/wireless-tag-wt32-sc01-plus/packages.yaml

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
